name: Renovate

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - uses: renovatebot/github-action@v46.1.13
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
